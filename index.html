<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Watch & Earn</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin: 0;
  padding: 0;
  text-align: center;
  color:#fff;
}

/* MAIN CARD MENU */
#mainContainer {
  display: none;
  padding: 20px;
  margin: 30px auto;
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}

/* BLUE BUTTON STYLE */
.button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  background: linear-gradient(45deg,#007bff,#00c6ff);
  color: white;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover{
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,198,255,0.7);
}

/* HEADER */
h1{
  margin-bottom:10px;
}

/* STATS BOX */
.stats{
  background: rgba(255,255,255,0.08);
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

/* JOIN POPUP */
#joinPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 999999999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 25px;
}

#popupBox {
  background: #ffffff10;
  padding: 30px 20px;
  border-radius: 14px;
  width: 85%;
  max-width: 380px;
  text-align: center;
  backdrop-filter: blur(7px);
  border: 1px solid rgba(255,255,255,0.15);
}

#popupBox h2 {
  color: white;
  font-size: 22px;
  margin-bottom: 25px;
  line-height: 1.4;
}

#popupButton {
  display: block;
  width: 100%;
  padding: 14px;
  background: linear-gradient(45deg,#007bff,#00c6ff);
  color: white;
  font-size: 18px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* TASK MESSAGE */
#taskMessage {
  display:none;
  color:#00ff00;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- JOIN CHANNEL POPUP -->
<div id="joinPopup">
  <div id="popupBox">
    <h2>🚫 You must join our channel to continue</h2>
    <a id="popupButton"
       href="https://t.me/earnzoners"
       target="_blank"
       onclick="joinChannelClicked()">
       👉 Join Telegram Channel
    </a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContainer">
  <h1>🎥 Watch & Earn</h1>

  <div class="stats">
    <p>💰 Balance: $<span id="balance">0.00</span></p>
  </div>

  <button class="button" id="watchBtn">🎥 Watch Videos</button>
  <button class="button" id="taskBtn">✅ Task</button>
  <button class="button" id="withdrawBtn">💵 Withdraw</button>
  <button class="button" id="referralBtn">🔗 Copy Referral Link</button>

  <div id="taskSection" style="display:none;">
    <h3>Complete Task</h3>
    <adsgram-task id="currentTask" data-block-id="task-25604"></adsgram-task>
    <div id="taskMessage">🎉 Social task completed successfully!</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const balanceKey='user_balance';
const tasksKey='tasks_completed';

const ADMIN_ID=6910486529;

let balance=parseFloat(localStorage.getItem(balanceKey))||0.06;
let tasksCompleted=JSON.parse(localStorage.getItem(tasksKey))||{};

const taskQueue=["task-25600","task-25601","task-25602","task-25603"];
let taskIndex=0;

const rewardBlocks = ["25599","25596","25598"];

async function updateUI(){
  document.getElementById("balance").textContent=balance.toFixed(2);
}
updateUI();

document.getElementById("referralBtn").addEventListener("click",()=>{
  const link=`https://t.me/Postnewanbot?start=${tg.initDataUnsafe.user.id}`;
  navigator.clipboard.writeText(link);
  alert("Referral link copied!");
});

const RewardAd=window.Adsgram.init({blockId:"25597"});

function addReward(amount){
  balance+=amount;
  localStorage.setItem(balanceKey,balance.toFixed(2));
  updateUI();
}

RewardAd.show().finally(()=>{
  document.getElementById("joinPopup").style.display="flex";
  document.getElementById("mainContainer").style.display="none";
});

function joinChannelClicked(){
  window.open("https://t.me/earnzoners","_blank");

  if(!localStorage.getItem('joined_channel')){
    addReward(0.001);
    localStorage.setItem('joined_channel',"yes");
    updateUI();
    alert("🎉 +$0.001 rewarded!");
  }

  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainContainer").style.display="block";
}

/* WATCH SYSTEM - 1 AD THEN COMMENT TASK */
document.getElementById("watchBtn").addEventListener("click", async ()=>{
  try{
    let res = await RewardAd.show(); // show 1 ad only
    if(res.done){
      // Show Comment button popup immediately after ad
      let popup = document.createElement("div");
      popup.style.position="fixed";
      popup.style.top="0";
      popup.style.left="0";
      popup.style.width="100%";
      popup.style.height="100%";
      popup.style.background="rgba(0,0,0,0.9)";
      popup.style.zIndex="999999999";
      popup.style.display="flex";
      popup.style.justifyContent="center";
      popup.style.alignItems="center";

      popup.innerHTML = `
      <div style="background:#fff;padding:20px;border-radius:12px;text-align:center;width:85%;max-width:350px;">
        <h3>💬 Leave a Comment</h3>
        <button id="commentBtn" style="padding:12px;background:#007bff;color:#fff;border:none;border-radius:8px;">
          👉 Click here to Comment
        </button>
      </div>
      `;

      document.body.appendChild(popup);

      document.getElementById("commentBtn").onclick = ()=>{
        popup.remove();

        // Load a random task from taskQueue
        let availableTasks = taskQueue.filter(t => !tasksCompleted[t]);
        if(availableTasks.length === 0){
          availableTasks = taskQueue.slice(); // reset if all done
          tasksCompleted = {};
        }
        let randomTaskId = availableTasks[Math.floor(Math.random()*availableTasks.length)];

        const commentPopup = document.createElement("div");
        commentPopup.style.position="fixed";
        commentPopup.style.top="0";
        commentPopup.style.left="0";
        commentPopup.style.width="100%";
        commentPopup.style.height="100%";
        commentPopup.style.background="rgba(0,0,0,0.9)";
        commentPopup.style.zIndex="999999999";
        commentPopup.style.display="flex";
        commentPopup.style.justifyContent="center";
        commentPopup.style.alignItems="center";

        commentPopup.innerHTML = `
        <div style="background:#fff;padding:20px;border-radius:12px;text-align:center;width:85%;max-width:350px;">
          <h3>📝 Comment Task</h3>
          <adsgram-task data-block-id="${randomTaskId}" id="commentTask"></adsgram-task>
        </div>
        `;

        document.body.appendChild(commentPopup);

        setTimeout(()=>{
          let taskEl = document.getElementById("commentTask");
          if(taskEl){
            taskEl.addEventListener("reward",()=>{
              addReward(0.05);
              tasksCompleted[randomTaskId] = true;
              localStorage.setItem(tasksKey, JSON.stringify(tasksCompleted));
              alert("🎉 You're successful! Commented on the video. Thanks for your feedback. You also earned $0.05 for watching videos.");
              commentPopup.remove();
            });
          }
        },500);
      };
    }
  }catch(e){
    console.log(e);
  }
});

/* TASK SYSTEM */
document.getElementById("taskBtn").addEventListener("click",()=>{
  document.getElementById("taskSection").style.display="block";
  loadTask(taskQueue[taskIndex]);
});

function loadTask(id){
  const newTask=document.createElement("adsgram-task");
  newTask.setAttribute("data-block-id",id);
  newTask.id="currentTask";
  document.getElementById("currentTask").replaceWith(newTask);

  newTask.addEventListener("reward",()=>{
    addReward(0.02);
    tasksCompleted[id]=true;
    localStorage.setItem(tasksKey,JSON.stringify(tasksCompleted));

    if(taskIndex<taskQueue.length-1){
      taskIndex++;
    }else{
      taskIndex=0;
      const msg=document.getElementById("taskMessage");
      msg.style.display="block";
      setTimeout(()=>{msg.style.display="none";},30000);
    }

    loadTask(taskQueue[taskIndex]);
  });
}

/* WITHDRAW (MIN $2) */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  if(balance<2) return alert("❌ Minimum withdraw is $2");

  tg.sendData(JSON.stringify({
    action:"forward_to_admin",
    admin_id:ADMIN_ID,
    user_id:tg.initDataUnsafe.user.id,
    amount:balance
  }));

  alert("✅ Withdrawal sent");
  balance=0;
  localStorage.setItem(balanceKey,balance.toFixed(2));
  updateUI();
});
</script>

</body>
</html>
