<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Watch & Earn</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin: 0;
  padding: 0;
  text-align: center;
  color:#fff;
}

/* Adexium Popup */
#adPopup {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999999;
}

#adBox {
  background:#111;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:350px;
}

#adBox img {
  width:100%;
  border-radius:10px;
}

#adBox button {
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:#000;
  font-weight:bold;
}

#mainContainer {
  padding: 20px;
  margin: 30px auto;
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
}

.button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  background: linear-gradient(45deg,#007bff,#00c6ff);
  color: white;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<!-- Adexium Popup -->
<div id="adPopup">
  <div id="adBox">
    <img id="adImage" src="">
    <button id="adBtn"></button>
  </div>
</div>

<div id="mainContainer">
  <h1>🎥 Watch & Earn</h1>

  <p>💰 Balance: $<span id="balance">0.00</span></p>

  <button class="button" id="watchBtn">🎥 Watch Videos</button>
  <button class="button" id="taskBtn">✅ Task</button>
  <button class="button" id="withdrawBtn">💵 Withdraw</button>
  <button class="button" id="referralBtn">🔗 Copy Referral Link</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const balanceKey='user_balance';
const ADMIN_ID=6910486529;

let balance = localStorage.getItem(balanceKey)
  ? parseFloat(localStorage.getItem(balanceKey))
  : 0;

function updateUI(){
  document.getElementById("balance").textContent=balance.toFixed(2);
}
updateUI();

function addReward(amount){
  balance += amount;
  localStorage.setItem(balanceKey, balance);
  updateUI();
}

/* 🔥 ADEXIUM FETCH */
async function showAdexiumAd() {
  try {
    const user = tg.initDataUnsafe.user;

    let res = await fetch("https://bid.tgads.live/bot-request", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        wid: "99220c34-31b8-45f6-bff5-8bd896fd5e09",
        language: "en",
        isPremium: false,
        firstName: user.first_name,
        telegramId: user.id.toString()
      })
    });

    let ad = await res.json();

    document.getElementById("adImage").src = ad.image;
    document.getElementById("adBtn").innerText = ad.buttonText;

    document.getElementById("adBtn").onclick = () => {
      window.open(ad.clickUrl, "_blank");
      document.getElementById("adPopup").style.display = "none";
      addReward(0.02); // reward after ad
    };

    document.getElementById("adPopup").style.display = "flex";

  } catch(e){
    alert("Ad not available, try again.");
  }
}

/* WATCH BUTTON */
document.getElementById("watchBtn").addEventListener("click",()=>{
  showAdexiumAd();
});

/* REFERRAL */
document.getElementById("referralBtn").addEventListener("click",()=>{
  const link=`https://t.me/Postnewanbot?start=${tg.initDataUnsafe.user.id}`;
  navigator.clipboard.writeText(link);
  alert("Copied!");
});

/* WITHDRAW */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  if(balance < 6) return alert("Minimum withdraw is $6");

  tg.sendData(JSON.stringify({
    action:"withdraw",
    amount:balance
  }));

  balance=0;
  localStorage.setItem(balanceKey, balance);
  updateUI();
});
</script>

</body>
</html>
